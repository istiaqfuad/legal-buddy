services:
  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      # Server-side only: the Next.js route handler proxies to the api service.
      - API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/shared/src:/app/apps/shared/src
      # Persist HuggingFace model cache so the embedding model is downloaded
      # only once, surviving container rebuilds/recreates.
      - hf-cache:/home/app/.cache/huggingface

volumes:
  hf-cache:
